<script>
var fill=document.getElementById('fill'),status=document.getElementById('status');
var pct=0;
var ticker=setInterval(function(){
  if(pct<88){pct+=1.2;fill.style.width=pct+'%';}
},120);

function setStatus(txt,p){
  status.textContent=txt;
  if(p!==undefined){pct=p;fill.style.width=p+'%';}
}

function showError(msg){
  clearInterval(ticker);
  document.getElementById('splash').innerHTML='<div class="sp-err">'+msg+'</div>';
}

function loadScript(url,cb,errMsg){
  var s=document.createElement('script');
  s.src=url;
  s.onload=cb;
  s.onerror=function(){showError(errMsg||'Impossible de charger: '+url+'<br/><br/>Vérifie ta connexion internet et recharge la page.');};
  document.head.appendChild(s);
}

function useIsMobile(bp=680){
  const [m,setM]=useState(()=>typeof window!=="undefined"?window.innerWidth<bp:false);
  useEffect(()=>{const h=()=>setM(window.innerWidth<bp);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[bp]);
  return m;
}

// ─── CRISIS ENGINE v2 ─────────────────────────────────────────────────────────
const CRISIS_HISTORY = new Set(); // track seen crisis IDs this session

function buildCrisisEvent(stepId, roster, plan, promo="WWE"){
  const isAEW = promo === "AEW";
  const grandFinal = isAEW ? "All In" : "WrestleMania";
  const show1 = isAEW ? "Dynamite" : "Raw";
  const show2 = isAEW ? "Collision" : "SmackDown";

  const act    = roster.filter(w => w.status === "active");
  const injured = roster.filter(w => w.status === "injured");
  if (!act.length) return null;

  const champions = act.filter(w => w.title);
  const mainEvent = act.filter(w => w.tier === "main-event");
  const rising    = act.filter(w => w.tier === "rising");
  const heels     = act.filter(w => w.role === "heel");
  const faces     = act.filter(w => w.role === "face");

  const wmWinner = plan?.winnerId   ? act.find(w => w.id === plan.winnerId)   : pick(mainEvent);
  const wmRival  = plan?.rivalId    ? act.find(w => w.id === plan.rivalId)    : pick(heels);
  const champ    = plan?.championId ? roster.find(w => w.id === plan.championId) : champions[0];

  const r1 = pick(rising) || pick(act);
  const r2 = pick(rising.filter(w => w.id !== r1?.id)) || pick(act.filter(w => w.id !== r1?.id));
  const randomW = pick(act);
  const randomHeel = pick(heels) || pick(act);
  const randomFace = pick(faces) || pick(act);

  // ── Pool universel (toujours disponible) ─────────────────────────────────
  const universalPool = [
    { id:"gm_fired", icon:"💼", sev:"critical",
      title: isAEW ? "TONY KHAN SOUS PRESSION" : "LE GM VIRÉ EN DIRECT",
      desc: isAEW
        ? `Tony Khan annonce en direct sur ${show1} qu'il prend le contrôle opérationnel du booking à la suite de résultats décevants. Les vestiaires sont en ébullition.`
        : `Le GM de ${show1} est licencié sans préavis. Un intérimaire est nommé pour la semaine — personne ne sait qui a le pouvoir.`,
      consequence: "Tous les matchs prévus sont à rebooker." },

    { id:"locker_revolt", icon:"⚡", sev:"warning",
      title: "RÉVOLTE DU VESTIAIRE",
      desc: isAEW
        ? `Plusieurs talents AEW refusent de se présenter à ${show1} en signe de protestation contre les conditions de travail. Tony Khan est en crise.`
        : `Un groupe de mid-carders boycotte le show en solidarité avec ${randomW?.name}. La direction est contrainte de revoir la carte en urgence.`,
      consequence: "Certains slots sont vides. Tu dois combler les trous." },

    { id:"sponsor_scandal", icon:"📰", sev:"warning",
      title: "SCANDALE MÉDIATIQUE",
      desc: `${randomW?.name} fait scandale sur les réseaux sociaux. Un tweet controversé déclenche une tempête médiatique qui éclabousse ${isAEW ? "AEW" : "WWE"}.`,
      consequence: isAEW ? "Tony Khan exige une promo de gestion de crise ce soir." : "La direction ordonne une promo de gestion de crise en direct." },

    { id:"contract_war", icon:"✍️", sev:"opportunity",
      title: "GUERRE DES CONTRATS",
      desc: isAEW
        ? `${r1?.name} est contacté par ${isAEW ? "WWE" : "AEW"} — sa loyauté est mise à l'épreuve. Tony Khan doit surenchérir ou perdre une pépite.`
        : `${r1?.name} entre dans la dernière année de son contrat. Des rumeurs d'approche AEW circulent. La direction veut le verrouiller avec un angle fort.`,
      consequence: "Donne-lui un push immédiat pour le fidéliser." },

    { id:"injury_surprise", icon:"🚑", sev:"critical",
      title: "BLESSURE EN COULISSE",
      desc: `${randomW?.name} se blesse à l'entraînement — fracture confirmée. Il sera absent ${Math.floor(Math.random()*3)+4} semaines minimum.`,
      consequence: "Son slot dans la carte doit être recomblé." },

    { id:"stable_implosion", icon:"💥", sev:"warning",
      title: "IMPLOSION DE STABLE",
      desc: isAEW
        ? `Le stable de ${randomHeel?.name} se déchire en direct — des accusations de leadership toxique fusent. La fissure est irrécupérable.`
        : `Le groupe de ${randomHeel?.name} vole en éclats après une altercation en coulisse. L'alliance est officiellement terminée.`,
      consequence: "Les ex-alliés sont désormais des rivaux naturels." },

    { id:"face_turns_heel", icon:"🔄", sev:"warning",
      title: "HEEL TURN SPONTANÉ",
      desc: `${randomFace?.name} vire heel de façon totalement spontanée — attaque son partenaire en plein match. La salle est sous le choc. Ça prend massivement.`,
      consequence: "Exploite le heat pendant qu'il est chaud." },

    { id:"heel_turns_face", icon:"⚡", sev:"opportunity",
      title: "FACE TURN INATTENDU",
      desc: `${randomHeel?.name} sauve ${randomFace?.name} d'un beatdown à 3 contre 1 — moment de face turn organique. La foule explose en pop massif.`,
      consequence: "Push immédiat ou ça retombe." },

    { id:"crowd_chant", icon:"📣", sev:"opportunity",
      title: "CHANT VIRAL",
      desc: `${r1?.name} reçoit un chant spontané monstre durant un segment — les réseaux sociaux s'enflamment. Le public le réclame en main event.`,
      consequence: "C'est le moment ou jamais de le pousher." },

    { id:"title_defection", icon:"🏆", sev:"critical",
      title: champ ? `${champ.name?.toUpperCase()} EXIGE PLUS` : "LE CHAMPION EXIGE PLUS",
      desc: champ
        ? `${champ.name}, champion ${champ.title}, exige d'être le main event de ${grandFinal} sans conditions. Il menace de no-show en cas de refus.`
        : `Le champion en titre exige une renégociation de son contrat en urgence — son avocat a envoyé une lettre.`,
      consequence: "Accorde ou prépare un tourney d'urgence." },

    { id:"mystery_attacker", icon:"🎭", sev:"warning",
      title: "ATTAQUANT MASQUÉ",
      desc: `Un mystérieux attaquant masqué frappe ${wmWinner?.name || randomW?.name} en coulisse. Aucune caméra n'a capté le visage. Les rumeurs vont bon train.`,
      consequence: "Révélation à planifier dans 2-3 semaines." },

    { id:"ppv_city_drama", icon:"🏙️", sev:"warning",
      title: isAEW ? "INCIDENT AU WEMBLEY" : "INCIDENT À VEGAS",
      desc: isAEW
        ? "La vente de billets pour All In au Wembley explose les records — mais les scalpers ont monopolisé les catégories VIP. Tollé médiatique."
        : "La ville hôte de WrestleMania menace d'annuler les autorisations suite à des incidents en dehors du ring. La pression sur la direction monte.",
      consequence: "La carte doit être irréprochable pour désamorcer." },

    { id:"ratings_crash", icon:"📉", sev:"critical",
      title: "CHUTE D'AUDIENCE",
      desc: `Le dernier ${show1} a enregistré son plus bas historique depuis 3 ans. ${isAEW ? "Tony Khan" : "La direction"} exige un shake-up immédiat de la carte.`,
      consequence: "Mets les plus gros noms en avant, cette semaine." },

    { id:"return_tease", icon:"⚡", sev:"opportunity",
      title: "TEASE DE RETOUR LÉGENDAIRE",
      desc: isAEW
        ? "Une silhouette non identifiée apparaît en fin de Dynamite. Les forums s'enflamment. Est-ce un retour légendaire pour All In ?"
        : "Une musique familière se déclenche en fin de Raw avant d'être coupée. La Twitterverse s'embrase. WrestleMania approche…",
      consequence: "Capitalise sur le buzz — révèle ou entretiens le mystère." },
  ];

  // ── Pool contextuel (dépend du plan) ────────────────────────────────────
  const contextPool = [];

  if (wmWinner) {
    contextPool.push(
      { id:`winner_promo_bomb_${wmWinner.id}`, icon:"🎤", sev:"opportunity",
        title: `PROMO BOMBE DE ${wmWinner.name.toUpperCase()}`,
        desc: `${wmWinner.name} lâche une promo d'anthologie sur ${show1} qui donne le ton pour ${grandFinal}. La foule est électrisée.`,
        consequence: "Son momentum est au max — exploite-le." },
      { id:`winner_doubt_${wmWinner.id}`, icon:"❓", sev:"warning",
        title: `DOUTES SUR ${wmWinner.name.toUpperCase()}`,
        desc: `${wmWinner.name} perd un match non-télévisé de façon embarrassante. Les doutes sur sa capacité à headliner ${grandFinal} refont surface.`,
        consequence: "Une victoire propre cette semaine est indispensable." }
    );
  }

  if (wmRival) {
    contextPool.push(
      { id:`rival_snaps_${wmRival.id}`, icon:"😤", sev:"warning",
        title: `${wmRival.name.toUpperCase()} PÈTE UN CÂBLE`,
        desc: `${wmRival.name} perd son sang-froid en coulisse et frappe un cadreur. ${isAEW ? "Tony Khan" : "La direction"} envisage une suspension.`,
        consequence: "Son match à ${grandFinal} est en suspens." },
      { id:`rival_ally_${wmRival.id}`, icon:"🤝", sev:"warning",
        title: `${wmRival.name.toUpperCase()} RECRUTE`,
        desc: `${wmRival.name} approche ${r2?.name || "un inconnu"} pour l'aider à neutraliser ${wmWinner?.name || "son rival"}. L'alliance est en train de se former.`,
        consequence: "Le 1v1 de ${grandFinal} devient plus compliqué." }
    );
  }

  if (injured.length) {
    const inj = pick(injured);
    contextPool.push(
      { id:`return_${inj.id}`, icon:"⚡", sev:"opportunity",
        title: `RETOUR SURPRISE : ${inj.name.toUpperCase()}`,
        desc: `${inj.name} revient plus tôt que prévu — il est guéri à 80% mais veut absolument être là pour ${grandFinal}. Les médecins ne sont pas d'accord.`,
        consequence: "À toi de décider : retour immédiat ou encore 2 semaines ?" }
    );
  }

  if (r1) {
    contextPool.push(
      { id:`breakout_${r1.id}`, icon:"📈", sev:"opportunity",
        title: `BREAKOUT : ${r1.name.toUpperCase()}`,
        desc: `${r1.name} vole la vedette sur ${show2} avec une performance de 20 minutes. Les fans votent massivement pour lui en ligne. Il est prêt pour le grand saut.`,
        consequence: "Push ou jalousie du vestiaire — à toi de choisir." }
    );
  }

  if (isAEW) {
    contextPool.push(
      { id:"njpw_drama", icon:"🌏", sev:"warning",
        title: "TENSION FORBIDDEN DOOR",
        desc: `Un talent NJPW prévu pour Forbidden Door refuse les conditions contractuelles AEW. L'accord entre les deux fédérations est fragilisé.`,
        consequence: "Le cross-over doit être reconfirmé ou remplacé." },
      { id:"elite_reunion", icon:"🖐️", sev:"opportunity",
        title: "RÉUNION ELITE ?",
        desc: `Des rumeurs de réunion de l'Elite complète circulent — les fans sont en ébullition sur Twitter. Tony Khan alimente le mystère.`,
        consequence: "Confirme ou démente — les deux créent du buzz." }
    );
  } else {
    contextPool.push(
      { id:"wwe_hall_tease", icon:"🏛️", sev:"opportunity",
        title: "TEASE HALL OF FAME",
        desc: `Une annonce Hall of Fame surprise est prévue pour WrestleMania Week — une légende va faire son retour dans l'arène. Les paris vont bon train.`,
        consequence: "Intègre une interaction avec un acteur de ta carte." },
      { id:"draft_rumor", icon:"📋", sev:"warning",
        title: "RUMEURS DE DRAFT",
        desc: `Des rumeurs de Draft surprise avant WrestleMania circulent — ${randomW?.name} serait transféré. Plusieurs contrats sont en renégociation.`,
        consequence: "Planifie les arcs en tenant compte des incertitudes." }
    );
  }

  // ── Merge tous les pools et filtrer déjà vus ────────────────────────────
  const allPool = [...universalPool, ...contextPool];
  const fresh = allPool.filter(e => !CRISIS_HISTORY.has(e.id));
  const pool = fresh.length > 0 ? fresh : allPool; // reset si tout vu

  if (!pool.length) return null;
  const chosen = pick(pool);
  CRISIS_HISTORY.add(chosen.id);
  return chosen;
}

const NOTES_1=["Recommence depuis les bases : 1 heel fort, 1 face fort, 1 feud claire.","Le momentum de tout le roster est en chute. Prends des risques créatifs."];

const HIGHLIGHTS_POOL=["Bonne utilisation des rivalités existantes","Équilibre face/heel cohérent","Actions variées sur la semaine","Montée en puissance progressive","Superstar bien mise en avant","Feud logique et convaincante","Moment de surprise bien placé","Champion utilisé avec autorité"];
const MISTAKES_POOL=["Trop d'actions identiques sur la semaine","Face utilisé en position de faiblesse sans raison","Heel sans heat suffisant","Champion absent ou mal mis en valeur","Rivalités ignorées","Momentum gaspillé sur un mauvais angle","Surcharge de superstars — manque de focus","Incohérence de rôle face/heel"];

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function pickN(arr,n){const s=[...arr];const r=[];while(r.length<n&&s.length){const i=Math.floor(Math.random()*s.length);r.push(s.splice(i,1)[0]);}return r;}
function fmtChant(c,name){return c.replace(/{NAME}/g,name?.split(" ")[0]?.toUpperCase()||"LET'S GO");}

// ── SCORING ENGINE (difficulty-aware) ──────────────────────────────
// difficulty = "normal" | "hard"
function scoreBooking(actions, roster, difficulty="normal"){
  if(!actions||actions.length===0) return difficulty==="hard"?1:1.5;
  const H=difficulty==="hard"; // shorthand

  let score=0;
  let total=0;
  const usedCats=new Set();
  const usedActionIds=new Set();
  const usedWids=new Set();
  let incoherenceCount=0;
  let repeatPenalty=0;

  for(const entry of actions){
    const w=roster.find(r=>r.id===entry.wid);
    if(!w) continue;
    total++;
    usedWids.add(entry.wid);
    const a=entry.action;
    if(!a) continue;

    // Actions répétées
    if(usedActionIds.has(a.id)) repeatPenalty+=H?2.5:1.5;
    usedActionIds.add(a.id);
    usedCats.add(entry.cat);

    // Base — HARD compresse davantage
    let base=H?(a.mom*0.55+a.heat*0.45)/2:(a.mom*0.7+a.heat*0.3)/2;

    // Cohérence rôle/action
    const isHeel=entry.role==="heel";
    const isTweener=entry.role==="tweener";
    const isHeelAct=["ph","mh","sh","ch"].some(p=>a.id?.startsWith(p));
    const isFaceAct=["pf","mf","sf","cf"].some(p=>a.id?.startsWith(p));

    if(isHeel&&isHeelAct)                    base*=H?1.25:1.3;
    else if(!isHeel&&!isTweener&&isFaceAct)  base*=H?1.25:1.3;
    else if(isTweener)                        base*=H?0.85:0.95;
    else { base*=H?0.40:0.60; incoherenceCount++; }

    // Tier
    if(w.tier==="main-event") base*=H?1.12:1.2;
    else if(w.tier==="rising") base*=H?1.04:1.1;

    // Stats superstar
    const popBonus=w.pop>=90?(H?1.2:1.5):w.pop>=80?(H?0.6:1.0):w.pop>=70?(H?0.2:0.4):(H?-0.3:0);
    const momBonus=w.mom>=90?(H?1.2:1.5):w.mom>=80?(H?0.6:1.0):w.mom>=70?(H?0.2:0.4):(H?-0.8:-0.3);
    base+=popBonus+momBonus;

    // Feud
    if(w.feuds&&w.feuds.length>0) base*=H?1.08:1.12;
    else base*=H?0.88:0.94;

    // Blessé
    if(w.status==="injured") base*=0.2;

    score+=base;
  }

  if(total===0) return H?1:1.5;

  score-=repeatPenalty;
  score-=incoherenceCount*(H?3.5:2);

  // Variété catégories — HARD exige 3+ pour passer au-dessus de 3★
  if(usedCats.size===1)      score*=H?0.45:0.60;
  else if(usedCats.size===2) score*=H?0.72:0.85;
  else if(usedCats.size===3) score*=H?1.08:1.12;
  else if(usedCats.size>=4)  score*=H?1.20:1.25;

  // One-man show
  if(usedWids.size===1&&total>1) score*=H?0.65:0.78;

  const raw=score/total;

  // NORMAL : seuils plus généreux — 3★ accessible, 5★ demande de l'effort
  // HARD   : seuils très resserrés — 5★ quasi-impossible sans tout aligner
  let normalized;
  if(H){
    if(raw<1.5)      normalized=1;
    else if(raw<3)   normalized=1+(raw-1.5)/1.5*1;
    else if(raw<4.5) normalized=2+(raw-3)/1.5*1;
    else if(raw<6)   normalized=3+(raw-4.5)/1.5*1;
    else if(raw<7.5) normalized=4+(raw-6)/1.5*0.5;
    else             normalized=4.5+(raw-7.5)/3*0.5;
  } else {
    if(raw<2)        normalized=1;
    else if(raw<3.5) normalized=1.5+(raw-2)/1.5*0.5;
    else if(raw<5)   normalized=2+(raw-3.5)/1.5*1;
    else if(raw<6.5) normalized=3+(raw-5)/1.5*1;
    else if(raw<8)   normalized=4+(raw-6.5)/1.5*0.5;
    else             normalized=4.5+(raw-8)/2*0.5;
  }

  normalized=Math.max(1,Math.min(5,normalized));
  return Math.round(normalized*2)/2;
}

function buildWrestlerNotes(actions, roster){
  const notes={};
  for(const entry of actions){
    const w=roster.find(r=>r.id===entry.wid);
    if(!w||!entry.action)continue;
    const isCoherent=(entry.role==="heel"&&["ph","mh","sh","ch"].some(p=>entry.action.id?.startsWith(p)))||
                     (entry.role==="face"&&["pf","mf","sf","cf"].some(p=>entry.action.id?.startsWith(p)));
    notes[entry.wid]=isCoherent
      ?\`\${w.name} bien utilisé — action cohérente avec son rôle.\`
      :\`\${w.name} — attention à la cohérence rôle/action.\`;
  }
  return notes;
}

function buildCrowdResult(stars, actions, roster){
  const noise=Math.min(5,Math.max(1,Math.round(stars)));
  const mainAct=actions?.filter(e=>e.action)?.[0];
  const mainW=mainAct?roster.find(r=>r.id===mainAct?.wid):null;

  let chantPool, reactionPool, voicePool, notePool, verdict;
  if(stars>=4.5){chantPool=CHANTS_HOT;reactionPool=REACTIONS_5;voicePool=VOICES_5;notePool=NOTES_5;verdict="OVATION DEBOUT";}
  else if(stars>=3.5){chantPool=CHANTS_WARM;reactionPool=REACTIONS_4;voicePool=VOICES_4;notePool=NOTES_4;verdict="CHAUD";}
  else if(stars>=2.5){chantPool=CHANTS_WARM;reactionPool=REACTIONS_3;voicePool=VOICES_3;notePool=NOTES_3;verdict="TIÈDE";}
  else if(stars>=1.5){chantPool=CHANTS_COLD;reactionPool=REACTIONS_2;voicePool=VOICES_2;notePool=NOTES_2;verdict="HEAT NÉGATIF";}
  else{chantPool=CHANTS_COLD;reactionPool=REACTIONS_1;voicePool=VOICES_1;notePool=NOTES_1;verdict="SILENCE GÊNANT";}

  // Heel actions can flip chant to heat chant
  const hasHeatAction=actions?.some(e=>["ph2","mh4","sh2","sh3"].includes(e.action?.id));
  if(hasHeatAction&&stars>=3) chantPool=CHANTS_HEAT;

  const chant=fmtChant(pick(chantPool),mainW?.name);
  const highlights=pickN(HIGHLIGHTS_POOL,Math.min(3,Math.ceil(stars)));
  const mistakes=stars<3.5?pickN(MISTAKES_POOL,Math.min(2,Math.floor(3.5-stars)+1)):[];

  return{
    stars,noise,chant,
    reaction:pick(reactionPool),
    voice:pick(voicePool),
    highlights,mistakes,
    note:pick(notePool),
    verdict,
    wrestler_notes:buildWrestlerNotes(actions||[],roster),
  };
}

// Wrapper async pour garder la même signature qu'avant
async function callCrowd(prompt, roster, actionsData=[], difficulty="normal"){
  await new Promise(r=>setTimeout(r,600+Math.random()*800));
  const stars=scoreBooking(actionsData,roster,difficulty);
  return buildCrowdResult(stars,actionsData,roster);
}

async function generateRoadPlan(roster){
  await new Promise(r=>setTimeout(r,800));
  const mainEvent=roster.filter(w=>w.tier==="main-event"&&w.status==="active");
  const rising=roster.filter(w=>w.tier==="rising"&&w.status==="active");
  const heels=mainEvent.filter(w=>w.role==="heel");
  const faces=mainEvent.filter(w=>w.role==="face"||w.role==="tweener");
  const champions=roster.filter(w=>w.title&&w.status==="active");

  const wmWinner=pick(faces.length?faces:mainEvent);
  const wmRival=pick(heels.filter(h=>h.id!==wmWinner.id).length?heels.filter(h=>h.id!==wmWinner.id):mainEvent.filter(w=>w.id!==wmWinner.id));

  // Le vainqueur du Rumble = celui qui va à WM (peut être différent du winner final)
  const rumbleWinner=wmWinner;
  // Le survivor de la Chamber = le challenger désigné
  const chamberPool=mainEvent.filter(w=>w.id!==wmWinner.id&&w.id!==wmRival?.id);
  const chamberSurvivor=chamberPool.length?pick(chamberPool):wmRival;
  // Champion en titre
  const champion=champions.length?pick(champions):null;

  const chaos=pick(roster.filter(w=>w.status==="active"&&w.id!==wmWinner.id));

  const ARCS=[
    \`\${wmWinner.name} cherche à prouver qu'il est le meilleur, \${wmRival?.name} fait tout pour l'en empêcher.\`,
    \`La rivalité entre \${wmWinner.name} et \${wmRival?.name} atteint son point de rupture.\`,
    \`\${wmWinner.name} doit surmonter la trahison de \${wmRival?.name} pour atteindre le sommet.\`,
    \`Deux visions s'affrontent : l'honneur de \${wmWinner.name} contre la domination de \${wmRival?.name}.\`,
  ];

  return{
    winner:wmWinner.id,
    winnerId:wmWinner.id,
    winnerName:wmWinner.name,
    rivalId:wmRival?.id,
    rivalName:wmRival?.name,
    rumbleWinnerId:rumbleWinner.id,
    rumbleWinnerName:rumbleWinner.name,
    chamberSurvivorId:chamberSurvivor?.id,
    chamberSurvivorName:chamberSurvivor?.name,
    championId:champion?.id,
    championName:champion?.name,
    championTitle:champion?.title,
    finalMatch:\`\${wmWinner.name} vs \${wmRival?.name}\`,
    card:[
      \`\${wmWinner.name} vs \${wmRival?.name} (Main Event WM)\`,
      \`\${pick(rising)?.name||"Rising Star"} vs \${pick(chamberPool)?.name||"Challenger"}\`,
    ],
    feuds:[{wrestlers:\`\${wmWinner.name} & \${wmRival?.name}\`,arc:pick(ARCS)}],
    narrative:pick(ARCS),
    chaos:{who:chaos.id,what:\`\${chaos.name} perturbe le plan principal.\`,impact:"Le booking doit être repensé."},
  };
}

/* ─── APPLY TITLE CHANGE to roster ──────────────────────────────── */
function applyTitleChange(prev, titleChange){
  if(!titleChange||!titleChange.fromId||!titleChange.toId) return prev;
  const from=prev.find(w=>w.id===titleChange.fromId);
  if(!from) return prev;
  return prev.map(w=>{
    if(w.id===titleChange.fromId) return {...w,title:null,mom:Math.max(0,w.mom-10)};
    if(w.id===titleChange.toId)   return {...w,title:from.title,mom:Math.min(100,w.mom+15),pop:Math.min(100,w.pop+5)};
    return w;
  });
}

  {id:"singles",   label:"Singles",          icon:"1v1", n:2, desc:"Match classique 1 contre 1"},
  {id:"triple",    label:"Triple Threat",     icon:"3⃣",  n:3, desc:"3 participants, pas de tag — le premier pin l'emporte"},
  {id:"fatal4",    label:"Fatal 4-Way",       icon:"4⃣",  n:4, desc:"4 participants simultanément — chaos garanti"},
  {id:"gauntlet",  label:"Gauntlet Match",    icon:"⚔️",  n:5, desc:"Chaque vainqueur affronte le suivant — le dernier survivant gagne"},
  {id:"elimination",label:"Elimination Chamber",icon:"⛓️",n:6, desc:"6 superstars, éliminations successives — dernier debout gagne"},
];

function MatchFormatPanel({roster, matchFormat, setMatchFormat, t}){
  const {format, participants, winnerId} = matchFormat;
  const curFmt = MATCH_FORMATS.find(f=>f.id===format)||MATCH_FORMATS[0];
  const active = roster.filter(w=>w.status==="active");

  const setFormat = (fmtId)=>{
    const f=MATCH_FORMATS.find(x=>x.id===fmtId);
    setMatchFormat({format:fmtId, participants:participants.slice(0,f.n), winnerId:null});
  };
  const toggleParticipant = (wid)=>{
    const isIn = participants.includes(wid);
    if(isIn){
      setMatchFormat(p=>({...p, participants:p.participants.filter(id=>id!==wid), winnerId:p.winnerId===wid?null:p.winnerId}));
    } else if(participants.length < curFmt.n){
      setMatchFormat(p=>({...p, participants:[...p.participants, wid]}));
    }
  };
  const setWinner = (wid)=> setMatchFormat(p=>({...p, winnerId:wid}));

  const partW = participants.map(id=>roster.find(w=>w.id===id)).filter(Boolean);
  const winnerW = winnerId ? roster.find(w=>w.id===winnerId) : null;
  const isComplete = participants.length===curFmt.n && winnerId;

  return <Surface t={t} style={{marginBottom:10}}>
    {/* Format selector */}
    <Label color={t.accent}>Format du match PPV</Label>

          </div>

        </div>;
      })}
    </div>

    {/* Format description */}
    <div style={{background:\`\${t.accent}08\`,border:\`1px solid \${t.accent}22\`,borderRadius:7,padding:"7px 10px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:16}}>{curFmt.icon}</span>
      <span style={{color:"#666",fontSize:11,fontStyle:"italic"}}>{curFmt.desc}</span>
    </div>

    {/* Participants */}
    {format!=="singles"&&<>
      <Label color={t.accent}>
        Participants {participants.length}/{curFmt.n}
        {participants.length===curFmt.n&&<span style={{color:"#00e5aa",marginLeft:6}}>✓</span>}
      </Label>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:5,marginBottom:10}}>
        {active.map(w=>{
          const inMatch=participants.includes(w.id);
          const full=!inMatch&&participants.length>=curFmt.n;
          const c=rc(w.role);
          return <div key={w.id} onClick={()=>!full&&toggleParticipant(w.id)}
            style={{background:inMatch?\`\${c}18\`:t.surface,border:\`1.5px solid \${inMatch?c:t.border}\`,borderRadius:8,padding:"8px 10px",cursor:full?"not-allowed":"pointer",opacity:full?.35:1,transition:"all .12s",WebkitTapHighlightColor:"transparent"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{color:inMatch?c:"#ccc",fontFamily:t.font,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{w.short}</span>
              {inMatch&&<span style={{color:c,fontSize:11}}>✓</span>}
            </div>
            <Tag color={c}>{w.role}</Tag>
            {w.title&&<div style={{color:t.alt,fontSize:8,marginTop:3}}>🏆 {w.title}</div>}
          </div>;
        })}
      </div>

      {/* Winner */}
      {participants.length===curFmt.n&&<>
        <Label color={t.accent}>Vainqueur</Label>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom: isComplete?10:0}}>
          {partW.map(w=>{
            const sel=winnerId===w.id;
            const c=rc(w.role);
            return <div key={w.id} onClick={()=>setWinner(w.id)}
              style={{background:sel?\`\${c}14\`:t.surface,border:\`1.5px solid \${sel?c:t.border}\`,borderRadius:8,padding:"8px 12px",cursor:"pointer",transition:"all .12s",display:"flex",alignItems:"center",gap:6,WebkitTapHighlightColor:"transparent"}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:c}}/>
              <span style={{color:sel?c:"#ccc",fontFamily:t.font,fontSize:11,textTransform:"uppercase"}}>{w.name}</span>
              {sel&&<span style={{color:c}}>✓</span>}
            </div>;
          })}
        </div>
      </>}

      {/* Summary */}
      {isComplete&&<div style={{background:\`\${t.accent}0a\`,border:\`1px solid \${t.accent}33\`,borderRadius:8,padding:"9px 12px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:16}}>{curFmt.icon}</span>
        <span style={{color:"#666",fontSize:11}}>{curFmt.label} :</span>

          {w.name}{w.id===winnerId?" 🏆":""}{i<partW.length-1?" vs ":""}
        </span>)}
      </div>}
    </>}
  </Surface>;
}
const NOISE_LVL={1:{label:"Silence de mort",emoji:"😶",c:"#555"},2:{label:"Indifférent",emoji:"😑",c:"#888"},3:{label:"Intéressé",emoji:"👀",c:"#f5c518"},4:{label:"En feu",emoji:"🔥",c:"#ff6b00"},5:{label:"EXPLOSION",emoji:"💥",c:"#ff003c"}};
const VERDICT_C={"OVATION DEBOUT":"#00e5aa","CHAUD":"#ff6b00","TIÈDE":"#f5c518","HEAT NÉGATIF":"#ff2244","SILENCE GÊNANT":"#555"};

function CrowdResult({result,loading,t}){
  if(loading)return <Surface t={t} style={{textAlign:"center",padding:28,marginTop:12}}>
    <div style={{fontSize:30,animation:"pulse .7s infinite alternate"}}>📣</div>
    <div style={{color:"#444",fontSize:11,letterSpacing:4,marginTop:8,fontFamily:t.font}}>LA FOULE RÉAGIT…</div>
    <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:10}}>
      {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:t.accent,animation:\`bounce .7s \${i*.15}s infinite alternate\`}}/>)}
    </div>
  </Surface>;
  if(!result)return null;
  const vc=VERDICT_C[result.verdict]||"#888";
  const nl=NOISE_LVL[result.noise]||NOISE_LVL[3];
  return <div style={{background:t.surface,border:\`1px solid \${vc}33\`,borderRadius:12,overflow:"hidden",marginTop:12,animation:"slideUp .4s ease"}}>
    <div style={{background:\`\${nl.c}10\`,borderBottom:\`1px solid \${nl.c}18\`,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:20}}>{nl.emoji}</span>
      <div style={{flex:1}}>
        <div style={{display:"flex",gap:2,marginBottom:3}}>{[1,2,3,4,5].map(n=><div key={n} style={{flex:1,height:3,borderRadius:1,background:n<=result.noise?nl.c:"#111"}}/>)}</div>
        <div style={{color:nl.c,fontSize:8,letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>{nl.label}</div>
      </div>
      <Tag color={vc}>{result.verdict}</Tag>
    </div>
    <div style={{padding:14}}>
      <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
        <Stars v={result.stars} size={22} color={t.alt}/>
        <span style={{color:t.alt,fontFamily:t.font,fontSize:30,lineHeight:1,textShadow:\`0 0 10px \${t.alt}44\`}}>{result.stars}</span>
        <span style={{color:"#333",fontSize:13}}>/5</span>
      </div>
      <div style={{background:"#ffffff04",border:\`1px solid \${nl.c}15\`,borderRadius:8,padding:"8px 12px",marginBottom:10,textAlign:"center"}}>
        <span style={{color:nl.c,fontFamily:t.font,fontSize:13,letterSpacing:3}}>📣 « {result.chant} »</span>
      </div>
      <p style={{color:"#aaa",fontSize:13,fontStyle:"italic",lineHeight:1.7,margin:"0 0 10px"}}>"{result.reaction}"</p>
      <div style={{borderLeft:\`3px solid \${vc}\`,paddingLeft:12,marginBottom:10}}>
        <Label>La foule</Label>
        <p style={{color:"#666",fontSize:12,lineHeight:1.7,margin:0}}>{result.voice}</p>
      </div>
      {(result.highlights?.length>0||result.mistakes?.length>0)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div style={{background:"#00e5aa08",border:"1px solid #00e5aa18",borderRadius:8,padding:10}}>
          <Label color="#00e5aa">✓ Points forts</Label>
          {result.highlights?.map((h,i)=><div key={i} style={{color:"#88e8cc",fontSize:11,lineHeight:1.6}}>· {h}</div>)}
        </div>
        <div style={{background:"#ff224408",border:"1px solid #ff224418",borderRadius:8,padding:10}}>
          <Label color="#ff2244">✗ Erreurs</Label>
          {result.mistakes?.length>0?result.mistakes.map((m,i)=><div key={i} style={{color:"#f5a0a8",fontSize:11,lineHeight:1.6}}>· {m}</div>):<div style={{color:"#333",fontSize:11}}>Aucune</div>}
        </div>
      </div>}
      <div style={{background:"#00e5aa06",border:"1px solid #00e5aa14",borderRadius:8,padding:10}}>
        <Label color="#00e5aa">📋 Note de booking</Label>
        <p style={{color:"#88e8cc",fontSize:12,lineHeight:1.7,margin:0}}>{result.note}</p>
      </div>
    </div>
  </div>;
}

      </div>
      {slots.map((a,wi)=><div key={wi} style={{marginBottom:8}}>
        <div style={{color:"#333",fontSize:8,letterSpacing:2,marginBottom:4,fontFamily:t.font}}>SEMAINE {wi+1}</div>
        {a?<div style={{background:\`\${c}0a\`,border:\`1.5px solid \${c}33\`,borderRadius:8,padding:"8px 10px",display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:14}}>{getActs(promo)[a.cat]?.icon}</span>
          <div style={{flex:1}}><div style={{color:c,fontSize:11,fontWeight:700}}>{a.action.label}</div><div style={{color:"#444",fontSize:9}}>{a.action.desc}</div></div>
          <button onClick={()=>onClearSlot(wi)} style={{background:"none",border:\`1px solid \${t.border}\`,color:"#555",width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:10,flexShrink:0}}>×</button>
        </div>

      </div>)}
    </div>}
  </div>;
}

/* ─── STORYLINE MODE ─────────────────────────────────────────────── */
function StorylineMode({roster,onHome,onStars,promo,difficulty="normal"}){
  const t=T[promo];const mob=useIsMobile();
  const [step,setStep]=useState(0);
  const [selected,setSelected]=useState([]);
  const [storyTitle,setStoryTitle]=useState("");
  const [stip,setStip]=useState(null);
  const [winner,setWinner]=useState(null);
  const [titleChange,setTitleChange]=useState(null);
  const [matchFormat,setMatchFormat]=useState({format:"singles",participants:[],winnerId:null});
  const [weeks,setWeeks]=useState([{},{},{},{}]);
  const [modal,setModal]=useState(null);
  const [ficheId,setFicheId]=useState(null);
  const [allResults,setAllResults]=useState([]);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);

  const selW=roster.filter(w=>selected.includes(w.id));
  const toggleW=id=>{if(selected.includes(id))setSelected(s=>s.filter(x=>x!==id));else if(selected.length<6)setSelected(s=>[...s,id]);};
  const getAct=(wid,wi)=>weeks[wi]?.[wid]||null;
  const pickAct=(wid,wi,cat,action)=>{setWeeks(p=>p.map((wk,i)=>i!==wi?wk:{...wk,[wid]:{cat,action}}));setModal(null);};
  const clearAct=(wid,wi)=>setWeeks(p=>p.map((wk,i)=>{if(i!==wi)return wk;const n={...wk};delete n[wid];return n;}));

  const submit=async()=>{
    setLoading(true);setResult(null);
    const stipD=STIPS.find(s=>s.id===stip);
    const winnerW=roster.find(w=>w.id===winner);
    const fmtD=MATCH_FORMATS.find(f=>f.id===matchFormat.format)||MATCH_FORMATS[0];
    // Bonus momentum selon format — plus c'est chaotique, plus ça buzz
    const fmtBonus=matchFormat.format==="fatal4"?4:matchFormat.format==="triple"?2:matchFormat.format==="gauntlet"?5:matchFormat.format==="elimination"?6:0;
    const actionsData=selW.flatMap(w=>[0,1,2,3].map(wi=>{const a=getAct(w.id,wi);return a?{wid:w.id,cat:a.cat,action:{...a.action,mom:(a.action.mom||0)+fmtBonus},role:w.role}:null;}).filter(Boolean));
    const r=await callCrowd("",roster,actionsData,difficulty);
    const enriched={...r,_label:"Storyline",matchFormat:fmtD.label,wrestler_notes:r.wrestler_notes||{}};
    if(titleChange?.fromId&&titleChange?.toId) setRoster(prev=>applyTitleChange(prev,titleChange));
    setAllResults(p=>[...p,enriched]);setResult(enriched);onStars(r.stars);setStep(2);setLoading(false);
  };
  const reset=()=>{setStep(0);setSelected([]);setStoryTitle("");setStip(null);setWinner(null);setTitleChange(null);setMatchFormat({format:"singles",participants:[],winnerId:null});setWeeks([{},{},{},{}]);setResult(null);};
  const modalW=modal?roster.find(w=>w.id===modal.wid):null;

  return <PageWrap t={t}>
    <div style={{maxWidth:860,margin:"0 auto",padding:"20px 14px 100px"}}>
      <NavBar title="🧵 Storyline" onHome={onHome} t={t}/>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 185px",gap:14}}>
        <div>
          {step===0&&<>
            <Surface t={t} style={{marginBottom:10}}>
              <Label color={t.accent}>1 — Titre (optionnel)</Label>
              <input value={storyTitle} onChange={e=>setStoryTitle(e.target.value)} placeholder="Ex: La trahison de Seth…"
                style={{width:"100%",background:"#ffffff05",border:\`1px solid \${t.border}\`,borderRadius:7,padding:"10px 12px",color:"#ddd",fontSize:13,outline:"none"}}
                onFocus={e=>e.target.style.borderColor=t.accent} onBlur={e=>e.target.style.borderColor=t.border}/>
            </Surface>
            <Surface t={t} style={{marginBottom:10}}>
              <Label color={t.accent}>2 — Acteurs (2 à 6)</Label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>
                {roster.map(w=>{const sel=selected.includes(w.id);const c=rc(w.role);
                  return <div key={w.id} onClick={()=>toggleW(w.id)}
                    style={{background:sel?\`\${c}14\`:t.surface,border:\`1.5px solid \${sel?c:t.border}\`,borderRadius:8,padding:"9px 10px",cursor:"pointer",transition:"all .12s",opacity:(!sel&&selected.length>=6)?.35:1,WebkitTapHighlightColor:"transparent"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{color:sel?c:"#ddd",fontFamily:t.font,fontSize:11,fontWeight:700,textTransform:"uppercase"}}>{w.short}</span>
                      {sel&&<span style={{color:c,fontSize:12}}>✓</span>}
                    </div>
                    <Tag color={c}>{w.role}</Tag>
                  </div>;
                })}
              </div>
              <div style={{color:"#444",fontSize:10,marginTop:8}}>{selected.length}/6 sélectionnés</div>
            </Surface>
            {selected.length>=2&&<>
              <Surface t={t} style={{marginBottom:10}}>
                <Label color={t.accent}>3 — Stipulation PPV final</Label>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(138px,1fr))",gap:5}}>
                  {getStips(promo).map(s=><div key={s.id} onClick={()=>setStip(s.id)}
                    style={{background:stip===s.id?\`\${t.accent}14\`:t.surface,border:\`1.5px solid \${stip===s.id?t.accent:t.border}\`,borderRadius:8,padding:"8px 10px",cursor:"pointer",transition:"all .12s",display:"flex",alignItems:"center",gap:7,WebkitTapHighlightColor:"transparent"}}>
                    <span style={{fontSize:13}}>{s.icon}</span>
                    <span style={{color:stip===s.id?t.accent:"#bbb",fontSize:11,fontWeight:700}}>{s.label}</span>
                  </div>)}
                </div>
              </Surface>
              {stip&&<Surface t={t} style={{marginBottom:12}}>
                <Label color={t.accent}>4 — Vainqueur</Label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {selW.map(w=><div key={w.id} onClick={()=>setWinner(w.id)}
                    style={{background:winner===w.id?\`\${rc(w.role)}14\`:t.surface,border:\`1.5px solid \${winner===w.id?rc(w.role):t.border}\`,borderRadius:8,padding:"8px 12px",cursor:"pointer",transition:"all .12s",display:"flex",alignItems:"center",gap:6,WebkitTapHighlightColor:"transparent"}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:rc(w.role)}}/>
                    <span style={{color:winner===w.id?rc(w.role):"#ccc",fontFamily:t.font,fontSize:12,textTransform:"uppercase"}}>{w.name}</span>
                    {winner===w.id&&<span style={{color:rc(w.role)}}>✓</span>}
                  </div>)}
                </div>
              </Surface>}
              {stip&&winner&&<Btn onClick={()=>setStep(1)} t={t} full>Planifier les 4 semaines →</Btn>}
              {stip&&winner&&<MatchFormatPanel roster={selW} matchFormat={matchFormat} setMatchFormat={setMatchFormat} t={t}/>}
              {stip&&winner&&<TitleChangePanel roster={roster} titleChange={titleChange} setTitleChange={setTitleChange} t={t}/>}
            </>}
          </>}

          {step===1&&<>
            {selW.map(w=><WrestlerCard key={w.id} w={w} role={w.role}
              onSetRole={()=>{}}
              slots={[0,1,2,3].map(wi=>getAct(w.id,wi))}
              onSlotClick={wi=>setModal({wid:w.id,wi})}
              onClearSlot={wi=>clearAct(w.id,wi)}
              ficheId={ficheId} setFicheId={setFicheId} t={t}/>)}
            <Surface t={t} style={{marginTop:10,marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:18}}>{STIPS.find(s=>s.id===stip)?.icon}</span>
                <div>
                  <div style={{color:t.alt,fontFamily:t.font,fontSize:12,letterSpacing:2}}>PPV — {STIPS.find(s=>s.id===stip)?.label}</div>
                  <div style={{color:"#555",fontSize:11}}>Vainqueur : <span style={{color:rc(roster.find(w=>w.id===winner)?.role||"face")}}>{roster.find(w=>w.id===winner)?.name}</span></div>
                </div>
                <div style={{marginLeft:"auto"}}><Btn onClick={()=>setStep(0)} variant="ghost" t={t} small>← Modifier</Btn></div>
              </div>
            </Surface>
            <Btn onClick={submit} disabled={loading} t={t} full>{loading?"⏳ La foule réagit…":"📣 Soumettre la storyline"}</Btn>
          </>}

          {step===2&&<>
            <CrowdResult result={result} loading={loading} t={t}/>
            <div style={{marginTop:14}}><Btn onClick={reset} t={t} full>🔁 Nouvelle storyline</Btn></div>
          </>}
        </div>
        {!mob&&<RosterPanel roster={roster} ficheId={ficheId} setFicheId={setFicheId} t={t} mobile={false}/>}
      </div>
    </div>
    {mob&&<RosterPanel roster={roster} ficheId={ficheId} setFicheId={setFicheId} t={t} mobile={true}/>}
    {modal&&<ActionPicker wrestler={modalW} currentAction={getAct(modal.wid,modal.wi)} role={modalW?.role||"face"} onPick={(cat,action)=>pickAct(modal.wid,modal.wi,cat,action)} onClose={()=>setModal(null)} t={t} promo={promo}/>}
    {ficheId&&<FicheModal wrestler={roster.find(w=>w.id===ficheId)} onClose={()=>setFicheId(null)} allResults={allResults} t={t}/>}
  </PageWrap>;
}

    {id:"locker_unrest",  icon:"🎭", sev:"warning", title:"TENSIONS EN COULISSE",       text:\`La moitié de la locker room ne veut plus te voir dans le main event. Pression maximale.\`,            effect:{type:"heat"}},

// Calendrier saison carrière
function buildCareerCalendar(promo, duration){
  const cal=PPV_CALENDAR[promo]||PPV_CALENDAR.WWE;
  // duration: "full" = tous les PPV, "half" = moitié, "custom" géré ailleurs
  const ppvs = duration==="half" ? cal.slice(0,Math.ceil(cal.length/2)) : cal;
  // Intercale 3-4 semaines entre chaque PPV
  const result=[];
  ppvs.forEach((ppv,i)=>{
    const weeksCount = i===0 ? 3 : 4;
    for(let w=1;w<=weeksCount;w++){
      const show=promo==="AEW"?(w%2===0?"Collision":"Dynamite"):(w%2===0?"SmackDown":"Raw");
      result.push({id:\`w\${result.length+1}\`,label:\`\${show} — Sem. \${result.length+1}\`,type:"week",ppvId:null});
    }
    result.push({...ppv,type:"ppv"});
  });
  return result;
}

/* ─── CAREER MODE ────────────────────────────────────────────────── */
function CareerMode({roster,setRoster,onHome,onStars,promo,difficulty="normal"}){
  const t=T[promo];const mob=useIsMobile();
  const [phase,setPhase]=useState("setup"); // setup | arc | playing | final

  const [arc,setArc]=useState(null);         // starting arc
  const [duration,setDuration]=useState("full");
  const [calendar,setCalendar]=useState([]);
  const [step,setStep]=useState(0);
  const [weekAction,setWeekAction]=useState(null); // {cat,action} for current week
  const [modal,setModal]=useState(false);
  const [event,setEvent]=useState(null);    // événement aléatoire
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [history,setHistory]=useState([]);  // [{label,stars,verdict,matchFormat?}]
  const [ficheId,setFicheId]=useState(null);
  const [allResults,setAllResults]=useState([]);
  const [titleChange,setTitleChange]=useState(null);
  const [matchFormat,setMatchFormat]=useState({format:"singles",participants:[],winnerId:null});
  const [showTurn,setShowTurn]=useState(false); // turn picker
  const [showResult,setShowResult]=useState(false);

  const startingArcs=getStartingArcs(promo);
  const cur=calendar[step]||null;
  const isPpv=cur?.type==="ppv";
  const totalPpvs=calendar.filter(s=>s.type==="ppv").length;
  const donePpvs=history.filter(h=>h.isPpv).length;
  const avgStars=history.length ? (history.reduce((s,h)=>s+h.stars,0)/history.length).toFixed(1) : "—";
  const heroInRoster=hero ? roster.find(w=>w.id===hero.id)||hero : null;

  // Démarre la partie
  const startGame=()=>{
    if(!hero||!arc) return;
    const cal=buildCareerCalendar(promo,duration);
    setCalendar(cal);setStep(0);setPhase("playing");
    setHistory([]);setWeekAction(null);setEvent(null);setResult(null);
    // Donner le titre si l'arc "champion" est choisi
    if(arc.id==="champion"){
      const titleName=promo==="AEW"?"AEW World Championship":"WWE Championship";
      setRoster(prev=>prev.map(w=>{
        if(w.id===hero.id) return {...w,title:titleName};
        if(w.title===titleName) return {...w,title:null};
        return w;
      }));
    }
    // Tirage de l'événement de départ
    const ev=buildCareerEvent(0,cal[0]?.id==="ppv"?cal[0].id:null,hero,roster,promo);
    if(ev) setEvent(ev);
  };

  const submitWeek=async()=>{
    if(!weekAction&&!isPpv) return;
    setLoading(true);setResult(null);
    const heroNow=roster.find(w=>w.id===hero.id)||hero;
    const fmtBonus=matchFormat.format==="fatal4"?4:matchFormat.format==="triple"?2:matchFormat.format==="gauntlet"?5:matchFormat.format==="elimination"?6:0;
    const actData=weekAction?[{wid:hero.id,cat:weekAction.cat,action:{...weekAction.action,mom:(weekAction.action.mom||0)+(isPpv?fmtBonus+3:fmtBonus)},role:heroNow.role}]:[];
    const r=await callCrowd("",roster,actData,difficulty);
    const fmtD=MATCH_FORMATS.find(f=>f.id===matchFormat.format)||MATCH_FORMATS[0];
    const enriched={...r,_label:cur?.label||"Semaine",isPpv,matchFormat:fmtD.label,wrestler_notes:r.wrestler_notes||{}};
    // Appliquer MOM + title change
    setRoster(prev=>{
      const withMom=prev.map(w=>{
        if(w.id!==hero.id) return w;
        const dm=weekAction?.action?.mom||0;
        return {...w,mom:clamp(w.mom+Math.round(dm/2)),pop:clamp(w.pop+(r.stars>=4?2:r.stars<=2?-1:0))};
      });
      return applyTitleChange(withMom,titleChange);
    });
    setHistory(p=>[...p,{label:cur?.label,stars:r.stars,verdict:r.verdict,isPpv,matchFormat:fmtD.label}]);
    setAllResults(p=>[...p,enriched]);
    onStars(r.stars);setResult(enriched);setShowResult(true);
    setWeekAction(null);setTitleChange(null);setMatchFormat({format:"singles",participants:[],winnerId:null});
    setLoading(false);
  };

  const nextStep=()=>{
    setShowResult(false);setResult(null);setEvent(null);
    const next=step+1;
    if(next>=calendar.length){setPhase("final");return;}
    setStep(next);
    // Événement aléatoire : ~35% semaine, ~75% PPV
    const nextCur=calendar[next];
    const prob=nextCur?.type==="ppv"?.75:.35;
    if(Math.random()<prob){
      const ev=buildCareerEvent(next,nextCur?.id,heroInRoster||hero,roster,promo);
      if(ev) setEvent(ev);

  // Timeline progress bar
  const progress=calendar.length>0?Math.round((step/calendar.length)*100):0;

          <span style={{color:"#fff",fontFamily:t.font,fontSize:15,letterSpacing:2,textTransform:"uppercase"}}>{cur?.label}</span>
          {cur?.month&&<span style={{color:"#333",fontSize:10,marginLeft:"auto"}}>{cur.month}</span>}
        </div>
        {/* Stip PPV spécifique */}
        {isPpv&&cur?.stip&&<div style={{background:\`\${t.alt}0a\`,border:\`1.5px solid \${t.alt}33\`,borderRadius:8,padding:"10px 12px",display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:20}}>{cur.stip.icon}</span>
          <div>
            <div style={{color:t.alt,fontFamily:t.font,fontSize:12,letterSpacing:2,fontWeight:700}}>{cur.stip.label}</div>
            <div style={{color:"#555",fontSize:11,lineHeight:1.5,marginTop:2}}>{cur.stip.desc}</div>
          </div>
        </div>}
      </Surface>

      {/* Événement aléatoire */}
      {event&&<div style={{background:event.sev==="epic"?\`\${t.alt}0c\`:event.sev==="critical"?"#ff224408":"#f5c51808",border:\`1.5px solid \${event.sev==="epic"?t.alt:event.sev==="critical"?"#ff2244":"#f5c518"}44\`,borderRadius:10,padding:"12px 14px",marginBottom:12,animation:"shakeIn .4s ease"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:20}}>{event.icon}</span>
          <div>
            <div style={{color:event.sev==="epic"?t.alt:event.sev==="critical"?"#ff2244":"#f5c518",fontFamily:t.font,fontSize:11,letterSpacing:2,fontWeight:700}}>{event.title}</div>
          </div>
          <div style={{marginLeft:"auto",background:event.sev==="epic"?\`\${t.alt}22\`:"none",border:\`1px solid \${event.sev==="epic"?t.alt:"#333"}\`,borderRadius:4,padding:"2px 7px",color:event.sev==="epic"?t.alt:"#555",fontSize:9,fontFamily:t.font}}>{event.sev==="epic"?"ÉPIQUE":event.sev==="critical"?"CRITIQUE":"INFO"}</div>
        </div>
        <div style={{color:"#888",fontSize:12,lineHeight:1.6}}>{event.text}</div>
      </div>}

      {/* Action de la semaine */}
      <Surface t={t} style={{marginBottom:10}}>
        <Label color={t.accent}>Ton action cette semaine</Label>
        {weekAction
          ?<div style={{background:\`\${rc(heroInRoster?.role||"face")}0a\`,border:\`1.5px solid \${rc(heroInRoster?.role||"face")}44\`,borderRadius:8,padding:"11px 13px",display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:16}}>{getActs(promo)[weekAction.cat]?.icon}</span>
            <div style={{flex:1}}>
              <div style={{color:rc(heroInRoster?.role||"face"),fontFamily:t.font,fontSize:12,fontWeight:700}}>{weekAction.action.label}</div>
              <div style={{color:"#555",fontSize:11,marginTop:2}}>{weekAction.action.desc}</div>
            </div>
            <Btn onClick={()=>setWeekAction(null)} variant="ghost" t={t} small>✕</Btn>
          </div>
          :<Btn onClick={()=>setModal(true)} t={t} full>+ Choisir une action</Btn>
        }
      </Surface>

      {/* PPV extras */}
      {isPpv&&<>
        <MatchFormatPanel roster={roster} matchFormat={matchFormat} setMatchFormat={setMatchFormat} t={t}/>
        <TitleChangePanel roster={roster} titleChange={titleChange} setTitleChange={setTitleChange} t={t}/>
      </>}

      <Btn onClick={submitWeek} disabled={loading||(!weekAction)} t={t} full>
        {loading?"⏳ La foule réagit…":isPpv?\`📣 Soumettre — \${cur?.label}\`:"📣 Soumettre la semaine"}
      </Btn>

      {/* History */}
      {history.length>0&&<div style={{marginTop:16}}>
        <Label color="#444">Historique saison</Label>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {history.slice(-8).reverse().map((h,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,background:t.surface,border:\`1px solid \${h.isPpv?t.alt+"33":t.border}\`,borderRadius:7,padding:"6px 10px"}}>
            <span style={{fontSize:10}}>{h.isPpv?"🏆":"📅"}</span>
            <span style={{color:h.isPpv?t.alt:"#777",fontFamily:t.font,fontSize:9,textTransform:"uppercase",flex:1,letterSpacing:1}}>{h.label}</span>
            <Stars v={h.stars} size={9} color={t.alt}/>
            <span style={{color:h.stars>=4?"#00e5aa":h.stars>=3?"#f5c518":"#ff2244",fontSize:9}}>{h.verdict}</span>
          </div>)}
        </div>
      </div>}
    </div>

    {/* Turn picker */}
    {showTurn&&heroInRoster&&<div style={{position:"fixed",inset:0,zIndex:200,background:"#000c",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowTurn(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:t.bg,border:\`1px solid \${t.border}\`,borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,padding:16,animation:"slideUp .3s ease"}}>
        <div style={{width:36,height:4,background:"#333",borderRadius:2,margin:"0 auto 14px"}}/>
        <Label color={t.accent}>Choisir un turn</Label>
        {TURN_OPTIONS.map(opt=>{
          const isCurrent=heroInRoster.role===opt.newRole;
          return <div key={opt.id} onClick={()=>{
            if(!isCurrent){setRoster(prev=>prev.map(w=>w.id===hero.id?{...w,role:opt.newRole,mom:clamp(w.mom+(opt.momBonus||0)),pop:clamp(w.pop+(opt.popBonus||0)),heat:clamp((w.heat||80)+(opt.heatBonus||0))}:w));}
            setShowTurn(false);
          }} style={{background:isCurrent?\`\${t.accent}0a\`:t.surface,border:\`1.5px solid \${isCurrent?t.accent:t.border}\`,borderRadius:9,padding:"12px 14px",marginBottom:8,cursor:isCurrent?"default":"pointer",opacity:isCurrent?.5:1,WebkitTapHighlightColor:"transparent"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:18}}>{opt.icon}</span>
              <span style={{color:isCurrent?t.accent:"#ddd",fontFamily:t.font,fontSize:13,fontWeight:700,textTransform:"uppercase"}}>{opt.label}</span>
              {isCurrent&&<Tag color={t.accent}>Actuel</Tag>}
            </div>
            <div style={{color:"#555",fontSize:11}}>{opt.desc}</div>
          </div>;
        })}
        <Btn onClick={()=>setShowTurn(false)} variant="ghost" t={t} full>Annuler</Btn>
      </div>
    </div>}

    {/* Result sheet */}
    {showResult&&result&&<div style={{position:"fixed",inset:0,zIndex:100,background:"#000c",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={nextStep}>
      <div onClick={e=>e.stopPropagation()} style={{background:t.bg,border:\`1px solid \${t.border}\`,borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,maxHeight:"85vh",overflowY:"auto",animation:"slideUp .4s ease",padding:16}}>
        <div style={{width:36,height:4,background:"#333",borderRadius:2,margin:"0 auto 12px"}}/>
        <CrowdResult result={result} loading={false} t={t}/>
        <div style={{marginTop:12}}><Btn onClick={nextStep} t={t} full>{step+1>=calendar.length?"Voir le bilan final →":"Semaine suivante →"}</Btn></div>
      </div>
    </div>}

    {modal&&heroInRoster&&<ActionPicker
      wrestler={heroInRoster}
      currentAction={weekAction}
      role={heroInRoster.role}
      onPick={(cat,action)=>{setWeekAction({cat,action});setModal(false);}}
      onClose={()=>setModal(false)}
      t={t} promo={promo}/>}
    {ficheId&&<FicheModal wrestler={roster.find(w=>w.id===ficheId)} onClose={()=>setFicheId(null)} allResults={allResults} t={t}/>}
  </PageWrap>;
}

/* ─── ROAD TO PPV ────────────────────────────────────────────────── */
function RoadMode({roster,setRoster,onHome,onStars,promo,difficulty="normal"}){
  const t=T[promo];const mob=useIsMobile();
  const road=ROAD[promo];
  const finalPPV=road[road.length-1]?.label||"Grand PPV";
  const [phase,setPhase]=useState("intro");
  const [plan,setPlan]=useState(null);
  const [step,setStep]=useState(0);
  const [weekResults,setWeekResults]=useState([]);
  const [crisis,setCrisis]=useState(null);
  const [loading,setLoading]=useState(false);
  const [ficheId,setFicheId]=useState(null);
  const [showPlan,setShowPlan]=useState(false);
  const [allResults,setAllResults]=useState([]);
  const [lastResult,setLastResult]=useState(null);
  const [ppvStip,setPpvStip]=useState(null);
  const [modal,setModal]=useState(null);
  const [titleChange,setTitleChange]=useState(null);
  const [matchFormat,setMatchFormat]=useState({format:"singles",participants:[],winnerId:null});
  const activeR=roster.filter(w=>w.status==="active");
  const [weekPlan,setWeekPlan]=useState(()=>activeR.map(w=>({wid:w.id,role:w.role,action:null})));
  const avg=weekResults.length?(weekResults.reduce((s,r)=>s+r.stars,0)/weekResults.length).toFixed(1):"—";

  const refreshPlan=useCallback(()=>{const act=roster.filter(w=>w.status==="active");setWeekPlan(act.map(w=>({wid:w.id,role:w.role,action:null})));},[roster]);
  const setRole=(wid,role)=>{setWeekPlan(p=>p.map(e=>e.wid===wid?{...e,role}:e));setRoster(prev=>prev.map(w=>w.id===wid?{...w,role}:w));};
  const pickAct=(wid,cat,action)=>{setWeekPlan(p=>p.map(e=>e.wid===wid?{...e,action:{cat,action}}:e));setModal(null);};
  const clearAct=(wid)=>setWeekPlan(p=>p.map(e=>e.wid===wid?{...e,action:null}:e));

  const maybeCrisis=(s,r,p)=>{
    const stepId=road[s]?.id;
    if(Math.random()<(road[s]?.type==="ppv"?.70:.40)){
      const ev=buildCrisisEvent(stepId,r,p||plan,promo);
      if(ev) setCrisis(ev);
    }
  };
  const start=async()=>{
    setPhase("gen");
    const p=await generateRoadPlan(roster);
    if(p?.chaos?.who)setRoster(prev=>prev.map(w=>w.id===p.chaos.who?{...w,status:"injured",mom:clamp(w.mom-20)}:w));
    setPlan(p||{narrative:"La route commence.",chaos:{what:"Blessure inattendue.",impact:"À rebooker."},card:[],feuds:[]});
    setPhase("active");setStep(0);refreshPlan();
    setTimeout(()=>maybeCrisis(0,roster,p),300);
  };
  const submitWeek=async()=>{
    setLoading(true);
    const s=road[step];
    const fmtBonus=matchFormat.format==="fatal4"?4:matchFormat.format==="triple"?2:matchFormat.format==="gauntlet"?5:matchFormat.format==="elimination"?6:0;
    const actionsData=weekPlan.filter(e=>e.action).map(e=>({wid:e.wid,cat:e.action.cat,action:{...e.action.action,mom:(e.action.action.mom||0)+fmtBonus},role:e.role}));
    // PPV bonus — stip adds hype
    if(s.type==="ppv"&&ppvStip) actionsData.forEach(a=>{if(a.action)a.action={...a.action,mom:(a.action.mom||0)+3,heat:(a.action.heat||0)+3};});
    const r=await callCrowd("",roster,actionsData,difficulty);
    const fmtD=MATCH_FORMATS.find(f=>f.id===matchFormat.format)||MATCH_FORMATS[0];
    const enriched={...r,_label:s.label,stepId:s.id,matchFormat:fmtD.label,wrestler_notes:r.wrestler_notes||{}};
    if(crisis){
      if(["injury","walkout","rumble_chaos","title_vacated","wm_threat"].includes(crisis.id)&&crisis.wrestler)
        setRoster(prev=>prev.map(w=>w.id===crisis.wrestler.id?{...w,status:"injured"}:w));
      if(["return","pop","heat"].includes(crisis.id)&&crisis.wrestler)
        setRoster(prev=>prev.map(w=>w.id===crisis.wrestler.id?{...w,status:"active",mom:clamp(w.mom+15)}:w));
    }
    setRoster(prev=>{
      const withMom=prev.map(w=>{const e=weekPlan.find(p=>p.wid===w.id);if(!e?.action)return w;return{...w,mom:clamp(w.mom+Math.round(e.action.action.mom/2))};});
      return applyTitleChange(withMom,titleChange);
    });
    setWeekResults(p=>[...p,enriched]);setAllResults(p=>[...p,enriched]);onStars(r.stars);setLastResult(enriched);setCrisis(null);setPpvStip(null);setTitleChange(null);setMatchFormat({format:"singles",participants:[],winnerId:null});
    const next=step+1;
    if(next>=road.length)setPhase("final");
    else{setStep(next);refreshPlan();setTimeout(()=>maybeCrisis(next,roster),200);}
    setLoading(false);
  };
  const restart=()=>{setPhase("intro");setWeekResults([]);setStep(0);setPlan(null);setCrisis(null);setAllResults([]);setLastResult(null);setPpvStip(null);setMatchFormat({format:"singles",participants:[],winnerId:null});refreshPlan();};
  const cur=road[step];
  const modalW=modal?roster.find(r=>r.id===modal.wid):null;
  const modalEntry=modal?weekPlan.find(e=>e.wid===modal.wid):null;

  if(phase==="intro")return <PageWrap t={t}>
    <div style={{maxWidth:620,margin:"0 auto",padding:"32px 14px",textAlign:"center"}}>
      <NavBar title={\`🎲 Road to \${finalPPV}\`} onHome={onHome} t={t}/>
      <div style={{fontFamily:t.font,fontSize:"clamp(1.8rem,7vw,3.5rem)",color:t.alt,letterSpacing:5,lineHeight:.85,marginBottom:20,textTransform:"uppercase",textShadow:\`0 0 20px \${t.alt}33\`}}>ROAD TO<br/>{finalPPV}</div>
      <Surface t={t} style={{textAlign:"left",marginBottom:20}}>
        {[{i:"🤖",tx:"L'IA génère un plan : vainqueur, feuds, card finale."},{i:"💥",tx:"Elle déclenche une crise qui brise son propre plan."},{i:"📅",tx:"Tu books chaque semaine avec la grille d'actions."},{i:"🎲",tx:"Des crises aléatoires surgissent. Adapte-toi."},{i:"📣",tx:\`La foule note chaque étape jusqu'à \${finalPPV}.\`}].map(({i,tx},idx)=>
          <div key={idx} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
            <span style={{fontSize:16,flexShrink:0}}>{i}</span>
            <p style={{color:"#666",fontSize:12,lineHeight:1.6,margin:0}}>{tx}</p>
          </div>)}
      </Surface>
      <Btn onClick={start} t={t}>🎲 Lancer le chaos</Btn>
    </div>
  </PageWrap>;

  if(phase==="gen")return <PageWrap t={t}>
    <div style={{textAlign:"center",padding:"100px 20px"}}>
      <div style={{fontSize:44,animation:"spin 2s linear infinite",marginBottom:14}}>⚙️</div>
      <div style={{color:t.accent,fontFamily:t.font,fontSize:17,letterSpacing:4,textTransform:"uppercase"}}>L'IA construit son plan…</div>
    </div>
  </PageWrap>;

  if(phase==="final")return <PageWrap t={t}>
    <div style={{maxWidth:680,margin:"0 auto",padding:"26px 14px 80px"}}>
      <NavBar title={\`🏆 Bilan — \${finalPPV}\`} onHome={onHome} t={t}/>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{color:t.alt,fontFamily:t.font,fontSize:"clamp(3rem,11vw,5rem)",lineHeight:1,textShadow:\`0 0 20px \${t.alt}44\`}}>{avg}</div>
        <div style={{color:"#444",fontSize:12,fontFamily:t.font,marginBottom:6}}>/ 5 — ROAD TO {finalPPV.toUpperCase()}</div>
        <Stars v={parseFloat(avg)||0} size={22} color={t.alt}/>
      </div>
      {plan&&<Surface t={t} style={{marginBottom:12}}>
        <Label color={t.accent}>Le plan secret du booking</Label>
        <p style={{color:"#666",fontSize:12,lineHeight:1.7,margin:"0 0 8px"}}>{plan.narrative}</p>
        <div style={{background:"#ff224408",border:"1px solid #ff224418",borderRadius:8,padding:10}}>
          <Label color="#ff2244">💥 Crise initiale</Label>
          <p style={{color:"#f5a0a8",fontSize:12,margin:"0 0 3px"}}>{plan.chaos?.what}</p>
          <p style={{color:"#555",fontSize:11,margin:0,fontStyle:"italic"}}>{plan.chaos?.impact}</p>
        </div>
      </Surface>}
      <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:14}}>
        {weekResults.map((r,i)=><div key={i} style={{background:t.surface,border:\`1px solid \${r.stars>=4?"#00e5aa":r.stars>=3?"#f5c518":"#ff2244"}18\`,borderRadius:8,padding:"8px 12px",display:"flex",gap:10,alignItems:"center"}}>
          <div style={{color:"#444",fontSize:11,minWidth:100,fontFamily:t.font}}>{r._label}</div>
          <Stars v={r.stars} size={10} color={t.alt}/>
          <div style={{color:"#444",fontSize:10,flex:1}}>{r.verdict}</div>
        </div>)}
      </div>
      <Btn onClick={restart} t={t} full>🔁 Nouvelle Route</Btn>
    </div>
  </PageWrap>;

  // ── ACTIVE ──
  return <PageWrap t={t}>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 14px 100px"}}>
      <NavBar title={\`🎲 Road to \${finalPPV}\`} onHome={onHome} t={t} extras={[
        <Btn key="plan" onClick={()=>setShowPlan(s=>!s)} variant="ghost" t={t} small>{showPlan?"Cacher":"Plan IA"}</Btn>,
        weekResults.length>0&&<div key="avg" style={{background:\`\${t.alt}12\`,border:\`1px solid \${t.alt}33\`,borderRadius:6,padding:"4px 9px",display:"flex",gap:4,alignItems:"center"}}><Stars v={parseFloat(avg)||0} size={10} color={t.alt}/><span style={{color:t.alt,fontFamily:t.font,fontSize:13}}>{avg}</span></div>,
      ].filter(Boolean)}/>

      {/* Timeline */}
      <div style={{overflowX:"auto",paddingBottom:8,marginBottom:14}}>
        <div style={{display:"flex",gap:3,minWidth:"max-content"}}>
          {road.map((s,i)=>{
            const done=i<step,isCur=i===step,isPpv=s.type==="ppv";
            const res=weekResults.find(r=>r.stepId===s.id);
            const bc=isCur?t.accent:done?(res?.stars>=4?"#00e5aa":res?.stars>=3?"#f5c518":"#ff2244"):"#111";
            return <div key={s.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:isPpv?68:40}}>
              <div style={{width:"100%",height:isPpv?24:20,borderRadius:4,background:isCur?\`\${t.accent}14\`:done?\`\${bc}12\`:"#ffffff03",border:\`1.5px solid \${bc}\`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .3s"}}>
                {done&&res?<span style={{fontSize:8,color:bc,fontFamily:t.font}}>{res.stars}★</span>:isCur?<span style={{color:t.accent,fontSize:9,animation:"pulse .7s infinite alternate"}}>▶</span>:<span style={{color:"#1a1a1a",fontSize:7,fontFamily:t.font}}>{isPpv?"PPV":"—"}</span>}
              </div>
              <div style={{color:isCur?t.accent:done?"#444":"#1a1a1a",fontSize:6,textAlign:"center",fontFamily:t.font,lineHeight:1.2,maxWidth:isPpv?68:40}}>{s.label}</div>
            </div>;
          })}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 185px",gap:14}}>
        <div>
          {showPlan&&plan&&<Surface t={t} style={{marginBottom:12,borderColor:\`\${t.accent}33\`,animation:"slideUp .3s ease"}}>
            <Label color={t.accent}>🤖 Plan IA (secret)</Label>
            <p style={{color:"#666",fontSize:12,lineHeight:1.7,margin:"0 0 8px"}}>{plan.narrative}</p>
            <div style={{background:"#ff224408",border:"1px solid #ff224418",borderRadius:8,padding:10}}>
              <Label color="#ff2244">💥 Crise initiale</Label>
              <p style={{color:"#f5a0a8",fontSize:12,margin:"0 0 3px"}}>{plan.chaos?.what}</p>
              <p style={{color:"#555",fontSize:11,margin:0,fontStyle:"italic"}}>{plan.chaos?.impact}</p>
            </div>
          </Surface>}

          {crisis&&<div style={{background:\`\${sevColor(crisis.sev)}08\`,border:\`2px solid \${sevColor(crisis.sev)}\`,borderRadius:10,padding:14,marginBottom:12,animation:"shakeIn .5s ease"}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
              <span style={{fontSize:26,flexShrink:0}}>{crisis.icon}</span>
              <div>
                <div style={{color:sevColor(crisis.sev),fontFamily:t.font,fontSize:13,letterSpacing:3,textTransform:"uppercase",marginBottom:5}}>{crisis.title}</div>
                <p style={{color:"#ddd",fontSize:13,lineHeight:1.7,margin:0}}>{crisis.desc}</p>
              </div>
            </div>
            {crisis.consequence&&<div style={{display:"flex",alignItems:"center",gap:8,background:"#ffffff05",border:\`1px solid \${sevColor(crisis.sev)}22\`,borderRadius:7,padding:"8px 11px"}}>
              <span style={{fontSize:13}}>⚠️</span>
              <span style={{color:"#777",fontSize:11,fontStyle:"italic"}}>{crisis.consequence}</span>
            </div>}
          </div>}

          {lastResult&&<CrowdResult result={lastResult} loading={false} t={t}/>}

          <Surface t={t} style={{marginBottom:10,borderColor:cur?.type==="ppv"?\`\${t.accent}55\`:t.border}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:cur?.type==="ppv"?10:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <Tag color={cur?.type==="ppv"?t.alt:t.accent}>{cur?.type==="ppv"?"🏆 PPV":"📅 Semaine"}</Tag>
                <span style={{color:"#fff",fontFamily:t.font,fontSize:15,letterSpacing:3,textTransform:"uppercase"}}>{cur?.label}</span>
              </div>
              <span style={{color:"#222",fontSize:10,fontFamily:t.font}}>{step+1}/{road.length}</span>
            </div>
            {cur?.type==="ppv"&&<div>
              {cur.specialStip&&<div style={{marginBottom:10}}>
                <Label color={t.alt}>Match principal imposé</Label>
                <div style={{background:\`\${t.alt}0a\`,border:\`2px solid \${t.alt}44\`,borderRadius:9,padding:"10px 13px",display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:20}}>{cur.specialStip.icon}</span>
                  <div>
                    <div style={{color:t.alt,fontFamily:t.font,fontSize:13,letterSpacing:2,fontWeight:700}}>{cur.specialStip.label}</div>
                    <div style={{color:"#555",fontSize:11,lineHeight:1.5,marginTop:2}}>{cur.specialStip.desc}</div>
                  </div>
                </div>
              </div>}
              <Label>Stipulation match secondaire</Label>
